name: Contracts CI

on:
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts
      - name: Run tests
        run: cargo test --all-features --verbose

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust with wasm32v1-none target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts
      - name: Build all contracts
        run: cargo build --target wasm32v1-none --release
      - name: Verify wasm outputs
        run: |
          ls -la target/wasm32v1-none/release/
          test -f target/wasm32v1-none/release/barakahpay_escrow.wasm
          test -f target/wasm32v1-none/release/barakahpay_registry.wasm
          echo "Escrow wasm size: $(du -h target/wasm32v1-none/release/barakahpay_escrow.wasm | cut -f1)"
          echo "Registry wasm size: $(du -h target/wasm32v1-none/release/barakahpay_registry.wasm | cut -f1)"
      - name: Upload wasm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contracts-wasm
          path: contracts/target/wasm32v1-none/release/*.wasm
          retention-days: 30

  lint:
    name: Format & Clippy (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts
      - name: Format check (informational)
        run: cargo fmt --all -- --check
        continue-on-error: true
      - name: Clippy (informational)
        run: cargo clippy --all-targets --all-features
        continue-on-error: true
