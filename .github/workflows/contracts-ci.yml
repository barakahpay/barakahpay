name: Contracts CI

on:
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  format:
    name: Format check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts
      - name: Run tests
        run: cargo test --all-features --verbose

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts
      - name: Install stellar CLI
        run: |
          curl -L https://github.com/stellar/stellar-cli/releases/latest/download/stellar-cli-installer-x86_64-unknown-linux-gnu.tar.gz -o stellar.tar.gz
          tar -xzf stellar.tar.gz
          sudo mv stellar /usr/local/bin/
          stellar --version
      - name: Build contracts
        run: |
          cd escrow
          stellar contract build
      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: escrow-wasm
          path: contracts/target/wasm32v1-none/release/barakahpay_escrow.wasm
          retention-days: 30
